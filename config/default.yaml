data:
  sampling_interval_s: 1
  input_budget_tokens: 4096
  canvas_budget_tokens: 4096
  canvas_recon_fraction: 0.5
  within_type_tiebreak: unit_id
  tokenized_replay_dir: data/processed/tokenized_replays
  window_manifest_path: data/processed/window_manifest.jsonl

fog:
  rate_distribution:
    name: uniform
    min: 0.0
    max: 0.8

model:
  d_model: 256
  layers: 10
  heads: 4
  ffn: 1024
  qk_norm: true
  self_conditioning: false
  gradient_checkpointing: false
  rope_theta: 500000.0
  rope_scaling:
    rope_type: llama3
    factor: 8.0
    low_freq_factor: 1.0
    high_freq_factor: 4.0
    original_max_position_embeddings: 8192

diffusion:
  mask_schedule:
    name: linear
    t_distribution: uniform
    min: 0.0
    max: 1.0
    loss_reweight: inverse_t

storage:
  data_uri: data/processed/quickstart
  raw_uri: data/raw/replays
  checkpoint_uri: checkpoints
  log_uri: logs
  local_cache_dir: .pipeline_cache

data_source:
  source: kaggle
  kaggle_dataset: mataeoanderson/sc2-replay-data
  kaggle_username_env: KAGGLE_USERNAME
  kaggle_key_env: KAGGLE_KEY
  extractor_path: ../SC2-gamestate-extractor
  extractor_command: python quickstart.py
  workers: 4

pipeline:
  auto_acquire: false
  smoke: false
  smoke_steps: 2
  seed: 123
  batch_size: 8
  replay_glob: "*.parquet"
  token_dictionary_uri: data/Token_Dictionary.json
  perspectives: p1,p2
  num_workers: 4
  prefetch_factor: 2
  cache_ram_fraction: 0.5
  split_seed: 1234
  test_fraction: 0.15
  dev_fraction: 0.10
  replay_subset_size: 0
  validation_replay_count: 0
  preprocess_if_missing: true
  rebuild_manifest: false

train:
  lr: 0.0003
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  adam_eps: 0.00000001
  warmup: 2000
  lr_floor_ratio: 0.1
  grad_clip: 1.0
  accum: as-needed
  accumulation_steps: 1
  target_effective_batch_tokens: 524288
  max_steps: 100000
  epochs: 6
  early_stopping_patience_epochs: 0
  early_stopping_min_relative_improvement: 0.001
  val_interval: 1000
  checkpoint_interval: 1000
  checkpoint_dir: checkpoints
  keep_step_checkpoints: false
  ema_decay: 0.9999
  confidence_loss_weight: 0.1
  self_cond_prob: 0.0
  precision: bf16
  require_cuda: false
  max_cuda_reserved_gb: 0.0

sampler:
  max_steps: 48
  temperature:
    start: 0.8
    end: 0.4
  entropy_bound: 0.1
  confidence_threshold: 0.0
  min_commit_per_step: 1

eval:
  heldout_split: validation
  timing_tolerance_buckets: 1
  fog_rate: 0.0

loss:
  use_fused_cross_entropy: false
  class_loss_weights:
    enemy_observed_reconstruction: 1.0
    enemy_fogged_reconstruction: 1.0
    enemy_future_prediction: 1.0
    delimiter: 1.0
    end: 1.0
    pad: 1.0
