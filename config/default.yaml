data:
  sampling_interval_s: 5
  input_window_timesteps: 60
  canvas_budget_tokens: 2048
  within_type_tiebreak: unit_id

fog:
  rate_distribution:
    name: uniform
    min: 0.0
    max: 0.8

model:
  d_model: 1536
  layers: 16
  heads: 12
  ffn: 4096
  qk_norm: true
  self_conditioning: true

diffusion:
  mask_schedule:
    name: linear
    t_distribution: uniform
    min: 0.0
    max: 1.0
    loss_reweight: inverse_t

storage:
  data_uri: data/processed/quickstart
  raw_uri: data/raw/replays
  checkpoint_uri: checkpoints
  log_uri: logs
  local_cache_dir: .pipeline_cache

data_source:
  source: kaggle
  kaggle_dataset: mataeoanderson/sc2-replay-data
  kaggle_username_env: KAGGLE_USERNAME
  kaggle_key_env: KAGGLE_KEY
  extractor_path: ../SC2-gamestate-extractor
  extractor_command: python quickstart.py
  workers: 4

pipeline:
  auto_acquire: false
  smoke: false
  smoke_steps: 2
  seed: 123
  batch_size: 2
  examples_per_replay: 1
  replay_glob: "*.parquet"
  token_dictionary_uri: data/Token_Dictionary.json
  perspectives: p1,p2

train:
  lr: 0.0003
  beta1: 0.9
  beta2: 0.95
  weight_decay: 0.1
  adam_eps: 0.00000001
  warmup: 2000
  lr_floor_ratio: 0.1
  grad_clip: 1.0
  accum: as-needed
  accumulation_steps: 1
  target_effective_batch_tokens: 524288
  max_steps: 100000
  val_interval: 1000
  checkpoint_interval: 1000
  checkpoint_dir: checkpoints
  ema_decay: 0.9999
  confidence_loss_weight: 0.1
  self_cond_prob: 0.5
  precision: bf16

sampler:
  max_steps: 48
  temperature:
    start: 0.8
    end: 0.4
  entropy_bound: 0.1
  confidence_threshold: 0.0
  min_commit_per_step: 1

eval:
  heldout_split: validation
  timing_tolerance_buckets: 1
  fog_rate: 0.0

loss:
  use_fused_cross_entropy: false
  class_loss_weights:
    enemy_observed_reconstruction: 1.0
    enemy_fogged_reconstruction: 1.0
    enemy_future_prediction: 1.0
    delimiter: 1.0
    end: 1.0
    pad: 1.0
